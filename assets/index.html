<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyHydroponic Monitor</title>
    <link rel="icon" href="./img/favicon.png">
    <link rel="stylesheet" type="text/css" href="style.css">

    <!-- Chart.js + annotation plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>

    <!-- Socket.IO -->
    <script src="libs/socket.io.min.js"></script>

    <!-- App -->
    <script src="app.js"></script>
</head>

<body>
<div class="app-container">

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <h1 class="arduino-text">MyHydroponic</h1>
            <span id="server-clock" class="server-clock">--:--:--</span>
        </div>

        <div class="control-panel">
            <div class="status-box">
                <span class="status-label">STATO:</span>
                <span id="system-status" class="status-value">LOADING...</span>
            </div>
            <div class="actions">
                <button class="btn btn-action btn-irrig" onclick="sendCommand('start_irrigation')">IRRIGATE</button>
                <button class="btn btn-action btn-recirc" onclick="sendCommand('start_recirculation')">MIX</button>
                <button class="btn btn-action btn-refill" onclick="sendCommand('refill_on')">REFILL</button>
                <button class="btn btn-action btn-stop" onclick="sendCommand('stop_all')">STOP ALL</button>
            </div>
        </div>

        <div class="header-right">
            <button id="theme-toggle" class="btn btn-theme" onclick="toggleTheme()" aria-label="Toggle theme"></button>
            <img class="arduino-logo" src="./img/RGB-Arduino-Logo_Color Inline Loop.svg" alt="Arduino Logo">
        </div>
    </div>

    <!-- KPI CARDS -->
    <div class="kpi-row" id="kpi-row"></div>

    <!-- TABS (generated by JS) -->
    <div class="tabs" id="tabs-bar"></div>

    <!-- CHART TABS (generated by JS) -->
    <div class="main-content" id="charts-root"></div>

    <!-- CONNECTION ERROR -->
    <div id="error-container" class="error-message" style="display: none;"></div>

</div>
</body>
</html>
